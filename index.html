<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>HI-TECH Service Pro - Final Print Fix</title>
    <style>
        :root { --primary: #2c3e50; }
        body { font-family: 'Segoe UI', Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .no-print { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        
        /* Checkbox Alignment */
        .check-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .check-grid label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }

        /* A4 Layout Style */
        #a4-report { width: 210mm; min-height: 297mm; padding: 15mm; background: white; margin: 20px auto; border: 1px solid #000; box-sizing: border-box; position: relative; display: none; }
        .a4-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; align-items: center; }
        .logo-img { max-height: 80px; max-width: 160px; object-fit: contain; }
        .stamp-img { position: absolute; bottom: 50px; right: 50px; width: 140px; transform: rotate(-5deg); z-index: 99; }
        .a4-title { text-align: center; font-size: 22px; font-weight: bold; border: 1px solid #000; margin: 15px 0; padding: 5px; background: #f2f2f2; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; }

        @media print {
            .no-print { display: none !important; }
            #a4-report { display: block !important; border: none !important; margin: 0 !important; width: 100% !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <!-- Branding Setup -->
    <div class="card" style="background:#eef7ff;">
        <h3>🏢 1. Setup Branding</h3>
        <div class="grid-4">
            <input type="text" id="set_comp" placeholder="Company Name">
            <input type="text" id="set_addr" placeholder="Address">
            <input type="text" id="set_phone" placeholder="Phone">
            <div>Logo: <input type="file" onchange="encodeImg(this, 'out_logo')"></div>
            <div>Stamp: <input type="file" onchange="encodeImg(this, 'out_stamp')"></div>
            <button style="background:#27ae60; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;" onclick="saveBranding()">Save Branding</button>
        </div>
    </div>

    <!-- Data Entry -->
    <div class="card">
        <h3>📝 2. Create Report</h3>
        <div class="grid-4">
            <input type="text" id="in_name" placeholder="Customer Name">
            <input type="text" id="in_branch" placeholder="Branch">
            <input type="text" id="in_phone" placeholder="Phone">
            <input type="text" id="in_no" placeholder="No" readonly>
            <input type="date" id="in_date">
            <input type="text" id="in_model" placeholder="Model">
            <input type="text" id="in_serial" placeholder="Serial No">
            <input type="number" id="in_price" placeholder="Total Amount">
        </div>
        <div class="check-grid" id="comp_form" style="margin-top:15px;">
            <label><input type="checkbox" value="Not Turning On"> Not Turning On</label>
            <label><input type="checkbox" value="Error Message"> Error Message</label>
            <label><input type="checkbox" value="Note Jamming"> Note Jamming</label>
        </div>
        <textarea id="in_remarks" placeholder="Work Description" rows="3" style="margin-top:10px;"></textarea>
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button style="background:#2c3e50; color:white; padding:12px 25px; border-radius:5px; border:none; font-weight:bold; cursor:pointer;" onclick="preparePrint()">🖨️ PREVIEW & PRINT</button>
            <button style="background:#27ae60; color:white; padding:12px 25px; border-radius:5px; border:none; cursor:pointer;" onclick="saveData()">💾 SAVE TO HISTORY</button>
        </div>
    </div>
</div>

<!-- A4 Page -->
<div id="a4-report">
    <div class="a4-header">
        <div>
            <h1 id="out_comp" style="margin:0;">SHOP NAME</h1>
            <p id="out_addr">Shop Address</p>
            <p id="out_phone">Phone No</p>
        </div>
        <img id="out_logo" class="logo-img" src="" alt=" ">
    </div>
    <div class="a4-title">SERVICE REPORT</div>
    <div style="border:1px solid #000; padding:10px; line-height:1.8;">
        Customer: <b id="out_name"></b> | No: <b id="out_no"></b> | Date: <span id="out_date"></span><br>
        Branch: <span id="out_branch"></span> | Phone: <span id="out_phone_c"></span>
    </div>
    <p><b>Machine:</b> <span id="out_model"></span> | <b>Serial:</b> <span id="out_serial"></span></p>
    <div id="out_comp_list" style="display:grid; grid-template-columns: repeat(3, 1fr); font-size:12px; margin:10px 0;"></div>
    <table>
        <tr><th>Description of Work</th><th width="20%">Price</th></tr>
        <tr><td id="out_remarks" style="height:200px; vertical-align:top; white-space:pre-wrap;"></td><td id="out_price" style="font-weight:bold; vertical-align:top;"></td></tr>
    </table>
    <img id="out_stamp" class="stamp-img" src="" alt=" ">
    <div style="display:flex; justify-content:space-between; margin-top:100px;">
        <div style="border-top:1px solid #000; width:180px; text-align:center;">Customer Sign</div>
        <div style="border-top:1px solid #000; width:180px; text-align:center;">Authorized Sign</div>
    </div>
</div>

<script>
    // ✅ FORCE SYNC FUNCTION (This fixes the blank print issue)
    function preparePrint() {
        const ids = ['name', 'branch', 'phone', 'no', 'date', 'model', 'serial', 'price', 'remarks'];
        ids.forEach(id => {
            let val = document.getElementById('in_' + id).value;
            let outElem = document.getElementById('out_' + id === 'phone' ? 'out_phone_c' : 'out_' + id);
            if(id === 'phone') document.getElementById('out_phone_c').innerText = val;
            else document.getElementById('out_' + id).innerText = val;
        });

        // Complaints sync
        let html = '';
        document.querySelectorAll('#comp_form input').forEach(c => {
            html += `<div>${c.checked ? '☑' : '☐'} ${c.value}</div>`;
        });
        document.getElementById('out_comp_list').innerHTML = html;

        // Show and Print
        document.getElementById('a4-report').style.display = 'block';
        setTimeout(() => { window.print(); }, 500);
    }

    function saveBranding() {
        const b = { comp: document.getElementById('set_comp').value, addr: document.getElementById('set_addr').value, phone: document.getElementById('set_phone').value, logo: document.getElementById('out_logo').src, stamp: document.getElementById('out_stamp').src };
        localStorage.setItem('hte_final_brand', JSON.stringify(b));
        alert("Saved!"); loadBranding();
    }

    function loadBranding() {
        const b = JSON.parse(localStorage.getItem('hte_final_brand')) || {};
        if(b.comp) {
            document.getElementById('out_comp').innerText = b.comp;
            document.getElementById('out_addr').innerText = b.addr;
            document.getElementById('out_phone').innerText = "📞 " + b.phone;
            document.getElementById('out_logo').src = b.logo;
            document.getElementById('out_stamp').src = b.stamp;
        }
    }

    function encodeImg(input, target) {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById(target).src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    window.onload = loadBranding;
</script>
</body>
</html>
