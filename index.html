<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>HI-TECH Service Software - Print Fixed</title>
    <style>
        :root { --primary: #2c3e50; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .no-print { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Branding CSS */
        #a4-report { 
            width: 210mm; min-height: 297mm; padding: 15mm; background: white; 
            margin: 20px auto; border: 1px solid #000; box-sizing: border-box; position: relative; 
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        /* IMPORTANT: Image visibility fix */
        .logo-img, .stamp-img { display: block !important; opacity: 1 !important; visibility: visible !important; }
        .logo-img { max-height: 80px; max-width: 150px; }
        .stamp-img { position: absolute; bottom: 100px; right: 50px; width: 140px; z-index: 999; }

        @media print {
            .no-print { display: none !important; }
            #a4-report { border: none; margin: 0; display: block !important; width: 100% !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            img { display: block !important; } /* Force images to show */
        }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="no-print">
    <!-- Setup Section -->
    <div class="card" style="background:#eef7ff; border:1px solid #3498db;">
        <h3>⚙️ Branding Setup</h3>
        <div class="grid-3">
            <input type="text" id="set_comp" placeholder="Company Name">
            <input type="text" id="set_phone" placeholder="Phone Number">
            <input type="text" id="set_addr" placeholder="Address">
            <div>Logo: <input type="file" id="logo_input" onchange="previewFile('logo_input', 'out_logo')"></div>
            <div>Stamp: <input type="file" id="stamp_input" onchange="previewFile('stamp_input', 'out_stamp')"></div>
            <button onclick="saveAll()" style="background:#27ae60; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">SAVE BRANDING ✅</button>
        </div>
    </div>

    <!-- Data Entry -->
    <div class="card">
        <h2>🛠️ Create Report</h2>
        <div class="grid-3">
            <input type="text" id="in_name" placeholder="Customer Name" oninput="sync()">
            <input type="text" id="in_no" placeholder="Report No" oninput="sync()">
            <input type="date" id="in_date" oninput="sync()">
            <textarea id="in_desc" placeholder="Work Description" class="grid-3" style="grid-column: span 3;" oninput="sync()"></textarea>
        </div>
        <button onclick="window.print()" style="margin-top:15px; padding:10px 20px; background:#2c3e50; color:white; border:none; border-radius:5px; cursor:pointer;">🖨️ PRINT REPORT</button>
    </div>
</div>

<!-- A4 Page Layout -->
<div id="a4-report">
    <div class="header">
        <div>
            <h1 id="out_comp" style="margin:0;">COMPANY NAME</h1>
            <p id="out_addr">Business Address</p>
            <p id="out_phone">Phone: 0000000000</p>
        </div>
        <!-- Logo Container -->
        <div id="logo_container">
            <img id="out_logo" class="logo-img" src="" alt="">
        </div>
    </div>

    <h2 style="text-align:center; border:1px solid #000; padding:5px; background:#f2f2f2; margin:15px 0;">SERVICE REPORT</h2>

    <div style="border:1px solid #000; padding:10px; line-height:1.6;">
        Customer: <b id="out_name"></b><br>
        Report No: <span id="out_no"></span> | Date: <span id="out_date"></span>
    </div>

    <table border="1" style="width:100%; border-collapse:collapse; margin-top:20px;">
        <tr><th style="padding:10px;">Work Description</th></tr>
        <tr><td id="out_desc" style="height:250px; padding:10px; vertical-align:top; white-space:pre-wrap;"></td></tr>
    </table>

    <!-- Stamp Image -->
    <img id="out_stamp" class="stamp-img" src="" alt="">

    <div style="display:flex; justify-content:space-between; margin-top:100px;">
        <p style="border-top:1px solid #000; width:150px; text-align:center;">Customer Sign</p>
        <p style="border-top:1px solid #000; width:150px; text-align:center;">Authorized Sign</p>
    </div>
</div>

<script>
    // 1. File to Base64 Function
    function previewFile(inputId, imgId) {
        const file = document.getElementById(inputId).files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            document.getElementById(imgId).src = reader.result;
        }
        if (file) { reader.readAsDataURL(file); }
    }

    // 2. Save Everything to Storage
    function saveAll() {
        const branding = {
            name: document.getElementById('set_comp').value,
            phone: document.getElementById('set_phone').value,
            addr: document.getElementById('set_addr').value,
            logo: document.getElementById('out_logo').src,
            stamp: document.getElementById('out_stamp').src
        };
        localStorage.setItem('hte_pro_brand', JSON.stringify(branding));
        alert("Branding Saved Successfully!");
        location.reload();
    }

    // 3. Load on Startup
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('hte_pro_brand'));
        if(saved) {
            document.getElementById('out_comp').innerText = saved.name || 'COMPANY NAME';
            document.getElementById('out_phone').innerText = "Phone: " + (saved.phone || '0000000000');
            document.getElementById('out_addr').innerText = saved.addr || 'Address';
            if(saved.logo) document.getElementById('out_logo').src = saved.logo;
            if(saved.stamp) document.getElementById('out_stamp').src = saved.stamp;
            
            // Fill settings fields
            document.getElementById('set_comp').value = saved.name || '';
            document.getElementById('set_phone').value = saved.phone || '';
            document.getElementById('set_addr').value = saved.addr || '';
        }
    }

    // 4. Data Sync
    function sync() {
        document.getElementById('out_name').innerText = document.getElementById('in_name').value;
        document.getElementById('out_no').innerText = document.getElementById('in_no').value;
        document.getElementById('out_date').innerText = document.getElementById('in_date').value;
        document.getElementById('out_desc').innerText = document.getElementById('in_desc').value;
    }
</script>

</body>
</html>
